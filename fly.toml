# Fly.io config — Harvey LiveKit agent worker.
# Outbound-only (connects to LiveKit Cloud), no HTTP surface.

app = "harvey-specter-agent"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  HARVEY_CHROMA_DIR = "/app/data/chroma_db"
  HARVEY_CORPUS_DIR = "/app/data/corpus"
  # Local DB was ingested with the default collection name "harvey_legal".
  # Must match what's actually on disk — otherwise Chroma opens the DB,
  # finds no collection with the requested name, creates an empty one,
  # and cite_statute returns 0 hits.
  HARVEY_COLLECTION = "harvey_legal"
  PYTHONUNBUFFERED = "1"

[[vm]]
  memory = "8gb"
  cpu_kind = "performance"
  cpus = 4

[deploy]
  strategy = "immediate"
